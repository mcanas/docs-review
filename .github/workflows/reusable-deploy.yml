name: Docs Review — Reusable Deploy

on:
  workflow_call:
    inputs:
      config-path:
        description: Path to docs-review.config.yml in the calling repo
        type: string
        default: docs-review.config.yml
      node-version:
        description: Node.js version to use for the build
        type: string
        default: '20'
    secrets:
      client-id:
        description: GitHub OAuth App Client ID
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to gh-pages branch
      pages: write
      id-token: write
      discussions: write

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4

      - name: Checkout docs-review tool
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/docs-review
          path: .docs-review-tool
          # pin to a release tag in production usage

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: .docs-review-tool/app/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: .docs-review-tool/app

      - name: Validate config
        run: |
          python3 - <<'EOF'
          import yaml, sys
          with open("${{ inputs.config-path }}") as f:
              cfg = yaml.safe_load(f)
          projects = cfg.get("projects", [])
          if not projects:
              sys.exit("docs-review.config.yml must have at least one project")
          for p in projects:
              if not p.get("name"):
                  sys.exit("Each project must have a name")
              if not p.get("docs_path"):
                  sys.exit("Each project must have a docs_path")
          print(f"Config valid: {len(projects)} project(s)")
          EOF

      - name: Setup Discussions category
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          gh api --method PATCH "repos/$OWNER/$REPO" -f has_discussions=true --silent || true

          RESPONSE=$(gh api graphql -f query='
            query($owner:String!,$repo:String!){
              repository(owner:$owner,name:$repo){
                id
                discussionCategories(first:20){ nodes{ id name } }
              }
            }
          ' -f owner="$OWNER" -f repo="$REPO")

          REPO_ID=$(echo "$RESPONSE" | jq -r '.data.repository.id')
          EXISTING_ID=$(echo "$RESPONSE" | jq -r '
            .data.repository.discussionCategories.nodes[]
            | select(.name=="📝 Doc Reviews") | .id' 2>/dev/null || echo "")

          if [ -n "$EXISTING_ID" ]; then
            echo "Discussion category already exists (id=$EXISTING_ID)"
            exit 0
          fi

          gh api graphql --input - <<EOF
          {
            "query": "mutation(\$input: CreateDiscussionCategoryInput!) { createDiscussionCategory(input: \$input) { discussionCategory { id name } } }",
            "variables": {
              "input": {
                "repositoryId": "$REPO_ID",
                "name": "📝 Doc Reviews",
                "emoji": ":memo:",
                "description": "Review threads created by docs-review",
                "format": "OPEN_ENDED"
              }
            }
          }
          EOF
          echo "Created '📝 Doc Reviews' discussion category"

      - name: Inject build config
        run: |
          echo "VITE_REPO_OWNER=${{ github.repository_owner }}" >> $GITHUB_ENV
          echo "VITE_REPO_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV
          echo "VITE_OAUTH_CLIENT_ID=${{ secrets.client-id }}" >> $GITHUB_ENV
          echo "VITE_GITHUB_API_URL=${{ github.api_url }}" >> $GITHUB_ENV
          CONFIG_CONTENT=$(cat ${{ github.workspace }}/${{ inputs.config-path }})
          echo "VITE_DOCS_CONFIG<<EOF" >> $GITHUB_ENV
          echo "$CONFIG_CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build
        run: npm run build
        working-directory: .docs-review-tool/app

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .docs-review-tool/app/dist
